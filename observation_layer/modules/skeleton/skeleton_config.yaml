# =============================================================================
# Skeleton Module Configuration (骨架處理模組設定)
# =============================================================================

# 補幀設定
interpolation:
  target_fps: 15
  source_fps: 1.5
  interpolation_method: "linear"
  sequence_length: 48
  buffer_size: 10
  smoothing_alpha: 0.25
  max_velocity: 40.0
  velocity_confidence_threshold: 0.6

# 骨架設定
skeleton:
  num_keypoints: 17
  confidence_threshold: 0.5
  skeleton_connections:
    - [0, 1]
    - [0, 2]
    - [1, 3]
    - [2, 4]
    - [5, 6]
    - [5, 7]
    - [7, 9]
    - [6, 8]
    - [8, 10]
    - [5, 11]
    - [6, 12]
    - [11, 12]
    - [11, 13]
    - [13, 15]
    - [12, 14]
    - [14, 16]
