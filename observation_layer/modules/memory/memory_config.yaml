# =============================================================================
# Memory Module Configuration (記憶層模組設定)
# =============================================================================

memory:
  # 是否啟用記憶層
  enabled: true
  # 人物去彈跳時間（秒）- 至少持續出現這麼久才寫入記憶層
  min_duration_threshold: 1.0
  # 動作穩定性延遲（秒）- 動作確認前的緩衝時間
  action_delay: 1.0
  # 人物消失超時（秒）
  person_timeout: 2.0
