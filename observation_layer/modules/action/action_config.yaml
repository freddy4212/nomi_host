# MMAction2 動作識別設定
action:
  # 模型配置檔案（會優先從 we_mma_receiver/mmaction2 尋找）
  config_file: "mmaction2/configs/skeleton/stgcnpp/stgcnpp_8xb16-joint-u100-80e_ntu60-xsub-keypoint-2d.py"
  # 模型權重檔案 (會優先從 modules/action/models/ 尋找，若不存在則自動下載)
