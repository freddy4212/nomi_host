# Virtual Endpoint Simulator Configuration (Template)
# Copy this file to config.yaml and fill in local paths/keys.

datasets:
  # NTU skeleton directory (.skeleton files)
  # Can be absolute or relative to this config.template.yaml directory
  ntu_skeleton_dir: "/path/to/NTU_RGB/nturgb+d_skeletons"

  # Orange4Home dataset root (expects o4h_all_events.csv inside)
  # Can be absolute or relative to this config.template.yaml directory
  orange4home_dir: "/path/to/Orange4Home/orange4home"

  # DALTON dataset root (expects Data/ and Metadata/ inside)
  # Can be absolute or relative to this config.template.yaml directory
  dalton_dir: "/path/to/DALTON/dalton-dataset-files"

llm:
  # LLM as a Judge settings (read from YAML only)
  api_key: "YOUR_GEMINI_API_KEY"
  model_name: "models/gemini-2.5-flash"
  judge_model: "gemini-2.5-flash"

server:
  host: "0.0.0.0"
  port: 8000
