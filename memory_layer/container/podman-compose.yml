# Home Agent Memory Layer - Podman Compose
# 使用方式：podman-compose up -d

version: "3.9"

services:
  postgres:
    image: timescale/timescaledb-ha:pg15
    container_name: home_agent_db
    environment:
      POSTGRES_USER: home_agent
      POSTGRES_PASSWORD: home_agent_pwd
      POSTGRES_DB: home_agent
      # 強制啟用擴展
      TS_TUNE_MEMORY: "128MB"
      TS_TUNE_NUM_CPUS: "1"
    ports:
      - "5432:5432"
    volumes:
      - home_agent_data:/home/postgres/pgdata/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U home_agent -d home_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  home_agent_data:
    driver: local
